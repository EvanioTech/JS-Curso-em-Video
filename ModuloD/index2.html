<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
    <style>
        div#res {
            font-size: 22px;
            
        }
    </style>
</head>
<body>
    <h1>Sistema de Multa </h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">
    </div>
    <div id="alert">
    </div>
    <div id="dica">
    </div>

    <h1>Sistema de Nacionalidade</h1>
    Qual pais você mora? <input type="string" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="nacionalidade()">
    <div id="bd">
    </div>
    <div id="alerta">
    </div>
    <div id="dicaN">
    </div>
    
    <script>
        function calcular() {
            let txtv = window.document.querySelector('input#txtvel')
            let res = window.document.querySelector('div#res')
            let alert = window.document.getElementById('alert')
            let dica = window.document.getElementById('dica')
            let vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}Km/h</strong></p>`
            if (vel > 60) {
                alert.innerHTML = `<p>Você esta Multado por excesso de velocidade</p>`
                alert.style.color ='red'
                alert.style.fontSize = '25px'
                  
            }
            dica.innerHTML += `<p>Dirija sempre com cinto de segurança!</p>`
            dica.style.color = 'blue'
            
        }
        function nacionalidade() {
            let txtp = window.document.querySelector('input#txtpais')
            let bd = window.document.querySelector('div#bd')
            let alerta = window.document.getElementById('alerta')
            let dica = window.document.getElementById('dicaN')
            let pais = (txtp.value)
            bd.innerHTML = `<p>Você mora no <strong>${pais}!</strong></p>`
            
            if (pais != 'Brasil') {
                alerta.innerHTML = `<p>Você é Estrangeiro!!</p>`
                alerta.style.color ='red'
                alerta.style.fontSize = '25px'
                  
            }
            dicaN.innerHTML += `<p>Brasil um pais de todos!</p>`
            dicaN.style.color = 'blue'
        }
        
    </script>
</body>
</html>
