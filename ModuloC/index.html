<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(187, 140, 231);
            color: aliceblue;
            font: normal 18pt Arial;
        }
        div#area{
            font: normal 20pt Arial;
            background-color: rgb(97, 97, 213);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai o resultaado</p>
    <p>Aprendendo a usar o <strong>DOM</strong> em Javascript.</p>
    <div>clique em mim</div>
    <div id="area" onclick="clicar()" onmouseenter="entrou()" onmouseout="sair()">
        interaja....
    </div>
    <script>
        let p1 = window.document.getElementsByTagName('p')[0]
        p1.style.color = 'red'
        function clicar() {
            let a = window.document.getElementById('area')
            a.innerText = 'Clicou'
        }
        function entrou() {
            let a = window.document.getElementById('area')
            a.innerText = 'Entrou'
        }
        function sair() {
            let a = window.document.getElementById('area')
            a.innerText = 'saiu'
            a.style.color = "pink"
        }
    </script>
</body>
</html>
